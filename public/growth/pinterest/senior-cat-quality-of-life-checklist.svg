<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Senior Cat Quality-of-Life Checklist</title>
  <desc id="desc">A vertical Pinterest checklist graphic for tracking senior cat appetite, litter box, grooming, mobility, behavior, and good days.</desc>
  <rect width="1000" height="1500" fill="#F6FAF7"/>
  <rect x="70" y="70" width="860" height="1360" rx="36" fill="#FFFFFF" stroke="#23413E" stroke-width="4"/>
  <circle cx="810" cy="168" r="62" fill="#E7F2EE"/>
  <path d="M765 154 L744 110 L798 136 Z" fill="#23413E"/>
  <path d="M856 154 L878 110 L823 136 Z" fill="#23413E"/>
  <circle cx="788" cy="170" r="9" fill="#23413E"/>
  <circle cx="835" cy="170" r="9" fill="#23413E"/>
  <path d="M811 186 q12 15 24 0" fill="none" stroke="#23413E" stroke-width="6" stroke-linecap="round"/>
  <path d="M810 185 q-12 15 -24 0" fill="none" stroke="#23413E" stroke-width="6" stroke-linecap="round"/>

  <text x="120" y="158" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#D9604C" letter-spacing="2">PAWCHECKIN</text>
  <text x="120" y="248" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Senior Cat</text>
  <text x="120" y="328" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Quality-of-Life</text>
  <text x="120" y="408" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Checklist</text>
  <text x="120" y="492" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526662">Track subtle changes before your</text>
  <text x="120" y="540" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526662">next licensed vet conversation.</text>

  <rect x="120" y="632" width="760" height="82" rx="18" fill="#E7F2EE"/>
  <text x="158" y="684" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Appetite and water</text>

  <rect x="120" y="744" width="760" height="82" rx="18" fill="#FFF3DD"/>
  <text x="158" y="796" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Litter box changes</text>

  <rect x="120" y="856" width="760" height="82" rx="18" fill="#EAF0FB"/>
  <text x="158" y="908" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Grooming and coat</text>

  <rect x="120" y="968" width="760" height="82" rx="18" fill="#F8E8E1"/>
  <text x="158" y="1020" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Jumping and mobility</text>

  <rect x="120" y="1080" width="760" height="82" rx="18" fill="#E7F2EE"/>
  <text x="158" y="1132" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Hiding, mood, and sleep</text>

  <rect x="120" y="1192" width="760" height="82" rx="18" fill="#FFF3DD"/>
  <text x="158" y="1244" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1D3230">Good days vs hard days</text>

  <text x="120" y="1364" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526662">Not a diagnosis. Talk with a licensed veterinarian.</text>
  <text x="120" y="1408" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#D9604C">PawCheckin.com</text>
</svg>
