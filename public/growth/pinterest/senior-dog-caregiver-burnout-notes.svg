<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Senior Dog Caregiver Burnout Notes</title>
  <desc id="desc">A vertical social preview graphic for tracking senior dog caregiver capacity, accidents, barking, pacing, sitter reports, sleep disruption, and vet questions.</desc>
  <rect width="1000" height="1500" fill="#F6F3EA"/>
  <rect x="70" y="70" width="860" height="1360" rx="34" fill="#FFFFFF" stroke="#243746" stroke-width="4"/>

  <rect x="70" y="70" width="860" height="350" rx="34" fill="#243746"/>
  <rect x="70" y="315" width="860" height="105" fill="#243746"/>
  <path d="M775 126c62 0 112 50 112 112s-50 112-112 112-112-50-112-112 50-112 112-112z" fill="#F0C96B"/>
  <path d="M760 175c28-26 72-26 100 0 28 27 28 70 0 97l-100 96-100-96c-28-27-28-70 0-97 28-26 72-26 100 0z" fill="#243746"/>
  <path d="M728 213c15-14 40-14 55 0 15-14 40-14 55 0 16 15 16 39 0 54l-55 52-55-52c-16-15-16-39 0-54z" fill="#FFFFFF"/>

  <text x="120" y="156" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#F0C96B">SENIOR DOG CARE</text>
  <text x="120" y="238" font-family="Inter, Arial, sans-serif" font-size="67" font-weight="850" fill="#FFFFFF">Caregiver</text>
  <text x="120" y="315" font-family="Inter, Arial, sans-serif" font-size="67" font-weight="850" fill="#FFFFFF">Burnout Notes</text>

  <text x="120" y="475" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">When care feels impossible, track the</text>
  <text x="120" y="523" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">pattern for a clearer vet conversation.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="595" width="760" height="92" rx="16" fill="#EEF5F7" stroke="#D4E2E7"/>
    <text x="160" y="653" font-size="33" font-weight="800" fill="#243746">Accidents and cleanup burden</text>

    <rect x="120" y="715" width="760" height="92" rx="16" fill="#FFF2CF" stroke="#E8D9AC"/>
    <text x="160" y="773" font-size="33" font-weight="800" fill="#243746">Barking, pacing, separation anxiety</text>

    <rect x="120" y="835" width="760" height="92" rx="16" fill="#F8E5E3" stroke="#E7C4C0"/>
    <text x="160" y="893" font-size="33" font-weight="800" fill="#243746">Sitter, groomer, and family reports</text>

    <rect x="120" y="955" width="760" height="92" rx="16" fill="#E6F1E9" stroke="#C9DED0"/>
    <text x="160" y="1013" font-size="33" font-weight="800" fill="#243746">Sleep, supervision, what is realistic</text>
  </g>

  <rect x="120" y="1105" width="760" height="175" rx="22" fill="#243746"/>
  <text x="160" y="1175" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#FFFFFF">Try a 7-day check-in</text>
  <text x="160" y="1222" font-family="Inter, Arial, sans-serif" font-size="28" fill="#DDE9EF">Care capacity is part of the home-care</text>
  <text x="160" y="1262" font-family="Inter, Arial, sans-serif" font-size="28" fill="#DDE9EF">picture, not a personal failure.</text>

  <text x="120" y="1362" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526577">Not a diagnosis. Use with a licensed veterinarian.</text>
  <text x="120" y="1406" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#CF684D">PawCheckin.com</text>
</svg>
