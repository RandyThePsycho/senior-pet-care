<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Senior Dog Slipping on Hardwood</title>
  <desc id="desc">A vertical Pinterest graphic for senior dog slipping on hardwood floors, standing up, ramps, traction, and vet questions.</desc>
  <rect width="1000" height="1500" fill="#FFF8EC"/>
  <rect x="70" y="70" width="860" height="1360" rx="36" fill="#FFFFFF" stroke="#23413E" stroke-width="4"/>

  <circle cx="820" cy="170" r="58" fill="#F3B85B"/>
  <circle cx="785" cy="150" r="18" fill="#23413E"/>
  <circle cx="838" cy="150" r="18" fill="#23413E"/>
  <ellipse cx="811" cy="187" rx="46" ry="32" fill="#23413E"/>
  <circle cx="774" cy="128" r="14" fill="#23413E"/>
  <circle cx="852" cy="128" r="14" fill="#23413E"/>

  <text x="120" y="158" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#D9604C" letter-spacing="2">PAWCHECKIN</text>
  <text x="120" y="252" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Senior Dog</text>
  <text x="120" y="336" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Slipping on</text>
  <text x="120" y="420" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1D3230">Hardwood?</text>

  <text x="120" y="510" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526662">Before buying random traction gear,</text>
  <text x="120" y="558" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526662">sort the pattern first.</text>

  <rect x="120" y="645" width="760" height="96" rx="20" fill="#E7F2EE"/>
  <text x="158" y="705" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#1D3230">Where does the fall happen?</text>

  <rect x="120" y="775" width="760" height="96" rx="20" fill="#EAF0FB"/>
  <text x="158" y="835" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#1D3230">Standing up or turning?</text>

  <rect x="120" y="905" width="760" height="96" rx="20" fill="#FFF3DD"/>
  <text x="158" y="965" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#1D3230">Paws, nails, rugs, or ramps?</text>

  <rect x="120" y="1035" width="760" height="96" rx="20" fill="#F8E8E1"/>
  <text x="158" y="1095" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#1D3230">After walks or after naps?</text>

  <rect x="120" y="1165" width="760" height="96" rx="20" fill="#E7F2EE"/>
  <text x="158" y="1225" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#1D3230">Questions for your vet</text>

  <text x="120" y="1364" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526662">Support categories, not a diagnosis.</text>
  <text x="120" y="1408" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#D9604C">PawCheckin.com</text>
</svg>
