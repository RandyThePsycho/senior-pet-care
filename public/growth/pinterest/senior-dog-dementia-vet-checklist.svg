<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Senior Dog Dementia Vet Checklist</title>
  <desc id="desc">A vertical social preview graphic for tracking possible senior dog cognitive changes, night waking, pacing, accidents, medication effects, caregiver sleep, and vet questions.</desc>
  <rect width="1000" height="1500" fill="#F6F3EA"/>
  <rect x="70" y="70" width="860" height="1360" rx="34" fill="#FFFFFF" stroke="#243746" stroke-width="4"/>

  <rect x="70" y="70" width="860" height="360" rx="34" fill="#243746"/>
  <rect x="70" y="320" width="860" height="110" fill="#243746"/>
  <circle cx="775" cy="245" r="116" fill="#F0C96B"/>
  <path d="M704 238c0-42 34-76 76-76s76 34 76 76-34 76-76 76-76-34-76-76z" fill="#243746"/>
  <path d="M745 232h70M745 262h70M779 198v100" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>

  <text x="120" y="156" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#F0C96B">SENIOR DOG CARE</text>
  <text x="120" y="238" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="850" fill="#FFFFFF">Dementia Vet</text>
  <text x="120" y="315" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="850" fill="#FFFFFF">Checklist</text>

  <text x="120" y="485" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">Not a diagnosis. Track patterns before</text>
  <text x="120" y="533" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">asking your veterinarian what to check.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="605" width="760" height="92" rx="16" fill="#EEF5F7" stroke="#D4E2E7"/>
    <text x="160" y="663" font-size="33" font-weight="800" fill="#243746">Night waking, pacing, confusion</text>

    <rect x="120" y="725" width="760" height="92" rx="16" fill="#FFF2CF" stroke="#E8D9AC"/>
    <text x="160" y="783" font-size="33" font-weight="800" fill="#243746">Accidents, appetite, water changes</text>

    <rect x="120" y="845" width="760" height="92" rx="16" fill="#F8E5E3" stroke="#E7C4C0"/>
    <text x="160" y="903" font-size="33" font-weight="800" fill="#243746">Medication timing and wobbliness</text>

    <rect x="120" y="965" width="760" height="92" rx="16" fill="#E6F1E9" stroke="#C9DED0"/>
    <text x="160" y="1023" font-size="33" font-weight="800" fill="#243746">Caregiver sleep and safe capacity</text>
  </g>

  <rect x="120" y="1115" width="760" height="175" rx="22" fill="#243746"/>
  <text x="160" y="1185" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#FFFFFF">Try a 7-day check-in</text>
  <text x="160" y="1232" font-family="Inter, Arial, sans-serif" font-size="28" fill="#DDE9EF">Bring clearer examples to a licensed</text>
  <text x="160" y="1272" font-family="Inter, Arial, sans-serif" font-size="28" fill="#DDE9EF">veterinarian before changing care.</text>

  <text x="120" y="1362" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526577">Observation support only. Not veterinary advice.</text>
  <text x="120" y="1406" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#CF684D">PawCheckin.com</text>
</svg>
