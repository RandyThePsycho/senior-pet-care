<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Senior Dog Accidents in the House and Caregiver Exhaustion</title>
  <desc id="desc">A vertical checklist for tracking senior dog accidents in the house, cleanup burden, sleep loss, mobility, water, appetite, and caregiver capacity.</desc>
  <rect width="1000" height="1500" fill="#F5F7F2"/>
  <rect x="70" y="70" width="860" height="1360" rx="34" fill="#FFFFFF" stroke="#1F3142" stroke-width="4"/>

  <rect x="70" y="70" width="860" height="385" rx="34" fill="#1F3142"/>
  <rect x="70" y="330" width="860" height="125" fill="#1F3142"/>
  <circle cx="792" cy="198" r="76" fill="#D96951"/>
  <rect x="710" y="260" width="160" height="76" rx="24" fill="#F3C75F"/>
  <rect x="742" y="224" width="96" height="74" rx="22" fill="#F5F7F2"/>
  <g fill="#F3C75F">
    <circle cx="654" cy="164" r="7"/>
    <circle cx="870" cy="125" r="5"/>
    <circle cx="892" cy="302" r="6"/>
    <circle cx="702" cy="120" r="4"/>
  </g>

  <text x="120" y="154" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#F3C75F" letter-spacing="2">SENIOR DOG CARE</text>
  <text x="120" y="238" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="850" fill="#FFFFFF">Accidents in</text>
  <text x="120" y="312" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="850" fill="#FFFFFF">the House</text>
  <text x="120" y="386" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="850" fill="#FFFFFF">Exhausted?</text>

  <text x="120" y="520" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">Track what happened and what the</text>
  <text x="120" y="568" font-family="Inter, Arial, sans-serif" font-size="33" fill="#526577">cleanup is doing to the household.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="640" width="760" height="90" rx="16" fill="#F8E5E3" stroke="#E7C4C0"/>
    <text x="160" y="697" font-size="34" font-weight="800" fill="#1F3142">Time, type, and location</text>

    <rect x="120" y="760" width="760" height="90" rx="16" fill="#EEF5F7" stroke="#D4E2E7"/>
    <text x="160" y="817" font-size="34" font-weight="800" fill="#1F3142">Water, appetite, stool, weight</text>

    <rect x="120" y="880" width="760" height="90" rx="16" fill="#FFF3D6" stroke="#E8D9AC"/>
    <text x="160" y="937" font-size="34" font-weight="800" fill="#1F3142">Mobility, pain signs, stress</text>

    <rect x="120" y="1000" width="760" height="90" rx="16" fill="#E4F2EB" stroke="#C8DED3"/>
    <text x="160" y="1057" font-size="34" font-weight="800" fill="#1F3142">Cleanup burden and sleep loss</text>
  </g>

  <rect x="120" y="1150" width="760" height="150" rx="22" fill="#1F3142"/>
  <text x="160" y="1216" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#FFFFFF">Make the vet conversation clearer</text>
  <text x="160" y="1264" font-family="Inter, Arial, sans-serif" font-size="29" fill="#DDE9EF">Include caregiver capacity, not just symptoms.</text>

  <text x="120" y="1362" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526577">Not a diagnosis. Use with a licensed veterinarian.</text>
  <text x="120" y="1406" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#D96951">PawCheckin.com</text>
</svg>
