<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">7-Day Senior Pet Check-In</title>
  <desc id="desc">A vertical Pinterest graphic for a seven-day senior pet reassessment and journal check-in.</desc>
  <rect width="1000" height="1500" fill="#F4F8FC"/>
  <rect x="72" y="72" width="856" height="1356" rx="36" fill="#FFFFFF" stroke="#22324A" stroke-width="4"/>
  <rect x="72" y="72" width="856" height="310" rx="36" fill="#22324A"/>
  <rect x="72" y="300" width="856" height="82" fill="#22324A"/>

  <text x="122" y="160" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#F4C95D" letter-spacing="2">7-DAY TRACKER</text>
  <text x="122" y="250" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="850" fill="#FFFFFF">Senior Pet</text>
  <text x="122" y="333" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="850" fill="#FFFFFF">Check-In</text>

  <text x="122" y="410" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526577">Reassess small changes over one week,</text>
  <text x="122" y="458" font-family="Inter, Arial, sans-serif" font-size="34" fill="#526577">then bring clearer notes to your vet.</text>

  <g font-family="Inter, Arial, sans-serif" font-weight="800">
    <rect x="122" y="545" width="156" height="132" rx="16" fill="#E6F0F4"/>
    <text x="172" y="625" font-size="44" fill="#22324A">1</text>
    <rect x="312" y="545" width="156" height="132" rx="16" fill="#FFF1CF"/>
    <text x="362" y="625" font-size="44" fill="#22324A">2</text>
    <rect x="502" y="545" width="156" height="132" rx="16" fill="#F8E2E1"/>
    <text x="552" y="625" font-size="44" fill="#22324A">3</text>
    <rect x="692" y="545" width="156" height="132" rx="16" fill="#E6F0F4"/>
    <text x="742" y="625" font-size="44" fill="#22324A">4</text>
    <rect x="122" y="715" width="156" height="132" rx="16" fill="#FFF1CF"/>
    <text x="172" y="795" font-size="44" fill="#22324A">5</text>
    <rect x="312" y="715" width="156" height="132" rx="16" fill="#F8E2E1"/>
    <text x="362" y="795" font-size="44" fill="#22324A">6</text>
    <rect x="502" y="715" width="348" height="132" rx="16" fill="#DFF1EA"/>
    <text x="622" y="795" font-size="44" fill="#22324A">7</text>
  </g>

  <g stroke="#22324A" stroke-width="4" stroke-linecap="round">
    <line x1="158" y1="648" x2="242" y2="648"/>
    <line x1="348" y1="648" x2="432" y2="648"/>
    <line x1="538" y1="648" x2="622" y2="648"/>
    <line x1="728" y1="648" x2="812" y2="648"/>
    <line x1="158" y1="818" x2="242" y2="818"/>
    <line x1="348" y1="818" x2="432" y2="818"/>
    <line x1="548" y1="818" x2="816" y2="818"/>
  </g>

  <rect x="122" y="925" width="728" height="72" rx="14" fill="#F7FAFD" stroke="#D5E0EA"/>
  <text x="158" y="973" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" fill="#22324A">Comfort</text>
  <rect x="122" y="1025" width="728" height="72" rx="14" fill="#F7FAFD" stroke="#D5E0EA"/>
  <text x="158" y="1073" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" fill="#22324A">Appetite and water</text>
  <rect x="122" y="1125" width="728" height="72" rx="14" fill="#F7FAFD" stroke="#D5E0EA"/>
  <text x="158" y="1173" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" fill="#22324A">Mobility and bathroom changes</text>
  <rect x="122" y="1225" width="728" height="72" rx="14" fill="#F7FAFD" stroke="#D5E0EA"/>
  <text x="158" y="1273" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" fill="#22324A">Mood, engagement, vet questions</text>

  <text x="122" y="1364" font-family="Inter, Arial, sans-serif" font-size="26" fill="#526577">Not a diagnosis. Use with a licensed veterinarian.</text>
  <text x="122" y="1408" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#E76653">PawCheckin.com</text>
</svg>
